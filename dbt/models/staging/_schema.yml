version: 2

models:
  - name: stg_orders
    description: "Cleaned orders with proper timestamp types and renamed columns."
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests: [not_null]
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: [delivered, shipped, canceled, unavailable, processing,
                       invoiced, created, approved]

  - name: stg_order_items
    description: "Cleaned order items with numeric price/freight columns."
    columns:
      - name: order_id
        tests: [not_null]
      - name: item_sequence
        tests: [not_null]
      - name: price
        tests: [not_null]

  - name: stg_customers
    description: "Cleaned customers with normalized state abbreviation."
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: state
        tests: [not_null]

  - name: stg_products
    description: "Cleaned product catalog with English category names."
    columns:
      - name: product_id
        tests: [not_null, unique]

  - name: stg_sellers
    description: "Cleaned sellers with normalized state."
    columns:
      - name: seller_id
        tests: [not_null, unique]

  - name: stg_order_payments
    description: "Cleaned payment records with numeric payment_value."
    columns:
      - name: order_id
        tests: [not_null]
      - name: payment_value
        tests: [not_null]

  - name: stg_order_reviews
    description: "Cleaned reviews with integer score."
    columns:
      - name: review_id
        tests: [not_null]
      - name: order_id
        tests: [not_null]
      - name: score
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]
